name: CI

# Builds the project, runs the JUnit test-suite with JaCoCo coverage,
# and verifies the Docker image builds — on every push and pull request.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build & run tests (with coverage)
        run: mvn -B clean test

      - name: Package executable JAR
        run: mvn -B package -DskipTests

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: course-project-jar
          path: target/*.jar

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: prox4:ci-${{ github.sha }}
